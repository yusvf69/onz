kind = "web"
previewPath = "/"
title = "ONZ - One Not Zero"
version = "1.0.0"
id = "artifacts/onz-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21173

[services.development]
run = "pnpm --filter @workspace/onz-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/onz-website", "run", "build" ]
publicDir = "artifacts/onz-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21173"
BASE_PATH = "/"
